name = "islamtok"
main = "src/index.js"
assets = { directory = "./public" }
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# ========================================
# إنشاء قاعدة D1 (شغّل الأمر مرة واحدة):
# npx wrangler d1 create islamtok-db
# ========================================
[[d1_databases]]
binding = "DB"
database_name = "islamtok-db"
database_id = ""

# ========================================
# إنشاء مخزن R2 (شغّل الأمر مرة واحدة):
# npx wrangler r2 bucket create islamtok-videos
# ========================================
[[r2_buckets]]
binding = "VIDEOS"
bucket_name = "islamtok-videos"

# ========================================
# متغيرات سرية (شغّل الأمر):
# echo "your-secret" | npx wrangler secret put JWT_SECRET
# ========================================
[vars]
JWT_SECRET = ""
