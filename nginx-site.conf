# ============================================
# إعدادات Nginx لموقع إسلام تيك - إنتاج
# انسخ إلى: /etc/nginx/sites-available/islamtok
# ⚠️ تأكد من عدم وجود مسافات في مسار المشروع على الخادم
# ============================================

# إعادة توجيه HTTP → HTTPS إجباري
server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    # HSTS سيُضاف بعد تفعيل SSL
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # شهادة Let's Encrypt (سيُعبئها Certbot لاحقاً)
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ============================================
    # ⚠️ تحذير: لا تستخدم مسافات في مسارات الخادم أبداً
    # ============================================

    # ============================================
    # هيدرز الأمان
    # ============================================
    add_header Strict-Transport-Security    "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options       "nosniff" always;
    add_header X-Frame-Options              "DENY" always;
    add_header Referrer-Policy              "strict-origin-when-cross-origin" always;

    # ============================================
    # ضغط gzip للنصوص
    # ============================================
    gzip on;
    gzip_types text/plain text/html text/css text/javascript application/json application/javascript image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    # ============================================
    # التوجيه إلى خادم Node.js (Express)
    # ============================================
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # رفع 250MB للفيديوات + إيقاف التخزين المؤقت للطلب لمنع Timeout
        client_max_body_size 250M;
        proxy_request_buffering off;

        # مهلات لمنع انقطاع رفع الفيديو
        proxy_read_timeout      180s;
        proxy_send_timeout      180s;
        proxy_connect_timeout   180s;
        client_body_timeout     180s;
    }

    # ============================================
    # تخزين مؤقت للملفات الثابتة (فيديو-صور)
    # ============================================
    location /processed/ {
        proxy_pass http://127.0.0.1:3000;
        expires 86400;
        add_header Cache-Control "public, immutable";
    }

    location /uploads/ {
        proxy_pass http://127.0.0.1:3000;
        expires 86400;
        add_header Cache-Control "public, immutable";
    }
}
